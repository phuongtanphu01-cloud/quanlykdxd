<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tra cứu thông tin</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<style>
.tabbar {
  display: flex;
  margin: 10px;
  gap: 10px;
}

.tabbar button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #ddd;
  font-weight: bold;
}

.tabbar button.active {
  background: #2196f3;
  color: white;
}
</style>

</head>

<body>

<header>
  <h2 id="title">📋 Tra cứu Hộ Kinh Doanh</h2>
</header>

<div class="tabbar">
  <button id="btnHKD" class="active" onclick="showHKD()">🏪 Hộ kinh doanh</button>
</div>
<div class="tabbar">
  <button id="btnXD" onclick="showXD()">🏗️ Giấy phép Xây dựng</button>
</div>
  
<input type="text" id="search" placeholder="🔍 Nhập từ khóa...">

<a class="map-btn" 
   href="https://www.google.com/maps/search/${encodeURIComponent(e.DIACHI || "")}" 
   target="_blank">
📍 Xem bản đồ
</a>
<div id="suggestions" class="suggestions"></div>

<div id="list"></div>

<script src="app.js"></script>

</body>
</html>
