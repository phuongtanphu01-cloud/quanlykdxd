<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tra cứu thông tin</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <h2 id="title">📋 Tra cứu HKD</h2>
</header>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button id="btnHKD" class="active" onclick="showHKD()">
    <div>🏪</div>
    <small>Hộ kinh doanh</small>
  </button>

  <button id="btnXD" onclick="showXD()">
    <div>🏗️</div>
    <small>Giấy phép Xây dựng</small>
  </button>
</div>
  
<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="search" placeholder="🔍 Nhập tên, địa chỉ, mã...">
</div>

<!-- GỢI Ý -->
<div id="suggestions" class="suggestions"></div>

<!-- CONTENT -->
<div id="list" class="content"></div>

<script src="app.js"></script>

</body>
</html>
